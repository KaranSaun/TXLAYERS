version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: texlayer_postgres
    environment:
      POSTGRES_DB: texlayer_db
      POSTGRES_USER: texlayer
      POSTGRES_PASSWORD: texlayer_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - texlayer_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U texlayer -d texlayer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: texlayer_redis
    ports:
      - "6379:6379"
    networks:
      - texlayer_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: texlayer_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - texlayer_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: texlayer_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/uploads --ignore-existing;
      mc mb myminio/outputs --ignore-existing;
      mc anonymous set download myminio/outputs;
      exit 0;
      "
    networks:
      - texlayer_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: texlayer_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - model_cache:/app/models_cache
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://texlayer:texlayer_pass@postgres:5432/texlayer_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_UPLOADS: uploads
      MINIO_BUCKET_OUTPUTS: outputs
      JWT_SECRET_KEY: 8f9a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_HOURS: 24
      DELTA_E_MERGE_THRESHOLD: 0.4
      MAX_LAYERS: 50
      MAX_COLORWAYS: 10
      MODEL_PATH: /app/models_cache
      CELERY_CONCURRENCY: 2
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - texlayer_network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: texlayer_worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - model_cache:/app/models_cache
    environment:
      DATABASE_URL: postgresql+asyncpg://texlayer:texlayer_pass@postgres:5432/texlayer_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_UPLOADS: uploads
      MINIO_BUCKET_OUTPUTS: outputs
      JWT_SECRET_KEY: 8f9a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_HOURS: 24
      DELTA_E_MERGE_THRESHOLD: 0.4
      MAX_LAYERS: 50
      MAX_COLORWAYS: 10
      MODEL_PATH: /app/models_cache
      CELERY_CONCURRENCY: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - texlayer_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: texlayer_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
    depends_on:
      - backend
    networks:
      - texlayer_network

  nginx:
    image: nginx:alpine
    container_name: texlayer_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - texlayer_network

networks:
  texlayer_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  model_cache:
